# GitHub Actions 工作流 - 自动化部署
# 触发条件：推送到 main 分支
# 部署方式：Nuxt 4（Nitro .output）+ PM2 零停机 reload
# 包管理：仅 pnpm；运行端口：3001（见 ecosystem.config.cjs）
# 业务环境变量：仅使用 Secret ENV_PRODUCTION_YUNFENG（多行 KEY=value，含 DB_* / NotifyX）

name: Deploy yunfeng

on:
  push:
    branches: [main] # 如果你的默认分支是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 pnpm（版本以 package.json 的 packageManager 为准，此处勿再写 version）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 3. 设置 Node.js 版本（与服务器保持一致）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      # 4. 安装依赖（包括 devDependencies，因为构建需要；锁定 pnpm-lock.yaml）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 从 GitHub Secret 写入构建用环境变量
      #    - ENV_PRODUCTION_YUNFENG：整份生产环境变量（多行 KEY=value）
      #    - 注意：rsync 排除 .env.*，密钥不会以明文文件落到服务器目录
      - name: Create .env from secrets
        env:
          ENV_PRODUCTION_YUNFENG: ${{ secrets.ENV_PRODUCTION_YUNFENG }}
        run: |
          if [ -z "$ENV_PRODUCTION_YUNFENG" ]; then
            echo "❌ Secret ENV_PRODUCTION_YUNFENG 未配置（请粘贴与本地 .env 相同的多行 KEY=value）"
            exit 1
          fi
          printf '%s\n' "$ENV_PRODUCTION_YUNFENG" > .env
          echo "✅ wrote .env from ENV_PRODUCTION_YUNFENG"

      # 6. 构建 Nuxt 应用（Nitro node-server）
      #    产物位于 .output/ 目录（入口：.output/server/index.mjs）
      - name: Build Nuxt app
        run: pnpm build
        env:
          # 构建预设；端口仅影响运行时，由 PM2 / ecosystem 管理
          NITRO_PRESET: node-server

      # 6.1 校验产物，避免把残缺构建同步到服务器
      - name: Verify build output
        run: |
          test -f .output/server/index.mjs || (echo "❌ missing .output/server/index.mjs" && exit 1)
          test -d .output/public || (echo "❌ missing .output/public" && exit 1)
          echo "✅ Nuxt build output OK"

      # 7. 上传构建产物到服务器
      #    - 将 .output/ 内的内容直接同步到 /server/yunfeng
      #      线上目录结构：server/、public/ 等，不再套一层 .output
      #    - 部署路径写死在本文件（/server/项目名），不再使用 DEPLOY_PATH Secret
      #    - 排除 .env.*、.runtime.env、ecosystem、logs，防止 --delete 清掉机上配置与日志
      - name: Deploy build output via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.env' --exclude='.env.*' --exclude='.runtime.env' --exclude='ecosystem.config.cjs' --exclude='logs'
          path: .output/
          remote_path: /server/yunfeng/
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      # 8. 上传 ecosystem.config.cjs（PM2 配置文件）
      #    单独上传确保配置始终最新
      - name: Deploy ecosystem.config.cjs via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz
          path: ecosystem.config.cjs
          remote_path: /server/yunfeng/
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      # 9. 远程执行零停机部署
      #    - 将 ENV_PRODUCTION_YUNFENG 写入服务器 .runtime.env，并补全 NUXT_ 运行时别名
      #    - 创建 logs 目录（防止 PM2 写日志失败）
      #    - 检查 server/index.mjs 是否存在（产物已展开到 /server/yunfeng 根目录）
      #    - 优先使用 pm2 reload（零停机）
      #    - 如果 reload 失败，回退到 pm2 startOrRestart（短暂停机）
      - name: Graceful reload PM2
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_PRODUCTION_YUNFENG: ${{ secrets.ENV_PRODUCTION_YUNFENG }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          # 把 ENV_PRODUCTION_YUNFENG 传进远程 shell（名称需出现在 envs 列表）
          envs: ENV_PRODUCTION_YUNFENG
          command_timeout: 60s # 给 reload 充足的时间
          script: |
            set -e
            cd /server/yunfeng

            # 确保日志目录存在
            mkdir -p logs

            # 检查 Nitro 入口是否存在
            if [ ! -f "server/index.mjs" ]; then
              echo "❌ Error: server/index.mjs not found in /server/yunfeng"
              exit 1
            fi

            # 检查 PM2 配置是否已随仓库部署
            if [ ! -f "ecosystem.config.cjs" ]; then
              echo "❌ Error: ecosystem.config.cjs not found"
              exit 1
            fi

            # 写入运行时环境（仅服务器本地，rsync --delete 已排除该文件）
            # 本地键名（DB_* / NOTIFYX_KEY）同时写出 NUXT_*，供 Nitro runtimeConfig 运行时覆盖
            if [ -z "$ENV_PRODUCTION_YUNFENG" ]; then
              echo "❌ ENV_PRODUCTION_YUNFENG empty"
              exit 1
            fi
            umask 077
            {
              printf '%s\n' "$ENV_PRODUCTION_YUNFENG"
              printf '%s\n' "$ENV_PRODUCTION_YUNFENG" | while IFS= read -r line || [ -n "$line" ]; do
                trimmed=$(printf '%s' "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                case "$trimmed" in
                  ''|\#*) continue ;;
                esac
                key=${trimmed%%=*}
                val=${trimmed#*=}
                case "$key" in
                  DB_HOST) printf 'NUXT_DB_HOST=%s\n' "$val" ;;
                  DB_PORT) printf 'NUXT_DB_PORT=%s\n' "$val" ;;
                  DB_USER) printf 'NUXT_DB_USER=%s\n' "$val" ;;
                  DB_PASSWORD) printf 'NUXT_DB_PASSWORD=%s\n' "$val" ;;
                  DB_NAME) printf 'NUXT_DB_NAME=%s\n' "$val" ;;
                  NOTIFYX_KEY) printf 'NUXT_NOTIFYX_KEY=%s\n' "$val" ;;
                esac
              done
            } > .runtime.env
            echo "✅ wrote .runtime.env from ENV_PRODUCTION_YUNFENG（含 NUXT_ 别名）"

            # 执行零停机 reload，失败则回退到 startOrRestart
            echo "🔄 Attempting zero-downtime reload..."
            pm2 reload ecosystem.config.cjs --update-env || \
              (echo "⚠️  Reload failed, falling back to restart..." && pm2 startOrRestart ecosystem.config.cjs --update-env)

            # 保存 PM2 配置（重启服务器后自动恢复）
            pm2 save

            echo "✅ Deployment completed successfully (port 3001)"
